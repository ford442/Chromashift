<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#D4AF37" />
    <title>Chromashift | Gold Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      html {
        scroll-behavior: smooth;
      }
      
      body {
        font-family: 'Playfair Display', serif;
        background: linear-gradient(135deg, #1a1505 0%, #2d2410 25%, #1a1505 50%, #2a1f0a 75%, #1a1505 100%);
        background-attachment: fixed;
        min-height: 100vh;
        color: #f5e6c8;
      }
      
      /* Custom Gold Scrollbar */
      ::-webkit-scrollbar {
        width: 12px;
      }
      
      ::-webkit-scrollbar-track {
        background: #1a1505;
      }
      
      ::-webkit-scrollbar-thumb {
        background: linear-gradient(180deg, #D4AF37 0%, #C5A028 50%, #B8941F 100%);
        border-radius: 6px;
        border: 2px solid #1a1505;
      }
      
      ::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(180deg, #E5C04A 0%, #D4AF37 50%, #C5A028 100%);
      }
      
      /* Firefox Scrollbar */
      * {
        scrollbar-width: thin;
        scrollbar-color: #D4AF37 #1a1505;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
