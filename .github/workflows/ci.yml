name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  guard:
    name: PR diff guard
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Block dist/ and accidental secrets
        run: bash .github/scripts/check-pr-diff.sh
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_PULL_REQUEST_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_SHA: ${{ github.sha }}

  web:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest
    needs: [guard]
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npx tsc -b
      - run: npm run build

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: [guard]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test

  e2e:
    name: Playwright smoke
    runs-on: ubuntu-latest
    needs: [web]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
        env:
          CI: true

  wasm:
    name: WASM build (optional)
    runs-on: ubuntu-latest
    needs: [guard]
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.64
          cache: true
      - run: npm run test:cpp
      - run: npm run build:wasm
      - name: Verify WASM artifacts exist
        run: test -f public/chromashift_engine.js && test -f public/chromashift_engine.wasm
